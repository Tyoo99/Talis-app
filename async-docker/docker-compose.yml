networks:
  laravel-net:
    driver: bridge

services:

  # ─── Redis ───────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - laravel-net

  # ─── User Service ────────────────────────────────────
  user-service-app:
    build:
      context: ./user-service
    container_name: user-service-app
    volumes:
      - ./user-service:/var/www
    networks:
      - laravel-net
    depends_on:
      - user-service-db

  user-service-nginx:
    image: nginx:stable-alpine
    container_name: user-service-nginx
    ports:
      - "8000:80"
    volumes:
      - ./user-service:/var/www
      - ./user-service/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel-net
    depends_on:
      - user-service-app

  user-service-db:
    image: mysql:8
    container_name: user-service-db
    environment:
      MYSQL_DATABASE: user_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    networks:
      - laravel-net

  # ─── Product Service ─────────────────────────────────
  product-service-app:
    build:
      context: ./product-service
    container_name: product-service-app
    volumes:
      - ./product-service:/var/www
    networks:
      - laravel-net
    depends_on:
      - product-service-db
      - redis

  product-service-nginx:
    image: nginx:stable-alpine
    container_name: product-service-nginx
    ports:
      - "8001:80"
    volumes:
      - ./product-service:/var/www
      - ./product-service/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel-net
    depends_on:
      - product-service-app

  product-service-db:
    image: mysql:8
    container_name: product-service-db
    environment:
      MYSQL_DATABASE: product_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3308:3306"
    networks:
      - laravel-net

  product-service-worker:
    build:
      context: ./product-service
    container_name: product-service-worker
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - ./product-service:/var/www
    networks:
      - laravel-net
    depends_on:
      - redis
      - product-service-db

  # ─── Order Service ────────────────────────────────────
  order-service-app:
    build:
      context: ./order-service
    container_name: order-service-app
    volumes:
      - ./order-service:/var/www
    networks:
      - laravel-net
    depends_on:
      - order-service-db
      - redis

  order-service-nginx:
    image: nginx:stable-alpine
    container_name: order-service-nginx
    ports:
      - "8002:80"
    volumes:
      - ./order-service:/var/www
      - ./order-service/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel-net
    depends_on:
      - order-service-app

  order-service-db:
    image: mysql:8
    container_name: order-service-db
    environment:
      MYSQL_DATABASE: order_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3309:3306"
    networks:
      - laravel-net

  # ─── Notification Service ────────────────────────────
  notification-service-app:
    build:
      context: ./notification-service
    container_name: notification-service-app
    volumes:
      - ./notification-service:/var/www
    networks:
      - laravel-net
    depends_on:
      - notification-service-db
      - redis

  notification-service-nginx:
    image: nginx:stable-alpine
    container_name: notification-service-nginx
    ports:
      - "8003:80"
    volumes:
      - ./notification-service:/var/www
      - ./notification-service/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel-net
    depends_on:
      - notification-service-app

  notification-service-db:
    image: mysql:8
    container_name: notification-service-db
    environment:
      MYSQL_DATABASE: notification_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3310:3306"
    networks:
      - laravel-net

  # ─── PostgreSQL untuk Hasura ──────────────────────────
  hasura-db:
    image: postgres:15-alpine
    container_name: hasura-db
    environment:
      POSTGRES_DB: hasura_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    networks:
      - laravel-net

  # ─── Hasura ───────────────────────────────────────────
  hasura:
    image: hasura/graphql-engine:v2.36.0
    container_name: hasura
    ports:
      - "8080:8080"
    networks:
      - laravel-net
    environment:
      HASURA_GRAPHQL_METADATA_DATABASE_URL: postgres://postgres:postgres@hasura-db:5432/hasura_db
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "true"
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup, http-log, webhook-log, websocket-log, query-log
      HASURA_GRAPHQL_ADMIN_SECRET: myadminsecretkey
    depends_on:
      - hasura-db
      - user-service-db