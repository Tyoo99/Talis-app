type User {
    id: ID!
    name: String!
    email: String!
    created_at: String
    updated_at: String
}

type Query {
    users: [User!]! @all
    user(id: ID! @eq): User @find
}

type Mutation {
    createUser(
        name: String!
        email: String!
        password: String!
    ): User @create

    updateUser(
        id: ID!
        name: String
        password: String
    ): User @update

    deleteUser(id: ID!): User @delete
}